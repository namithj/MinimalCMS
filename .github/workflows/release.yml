name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  ARTIFACT_NAME: minimalcms

jobs:
  # ── 1. Run tests to make sure the tag is healthy ────────────────────────
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ["8.3"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: sodium, json, mbstring
          coverage: none

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run unit tests
        run: composer test:unit

  # ── 2. Build & package the release zip ──────────────────────────────────
  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: sodium, json, mbstring
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Build front-end assets
        run: npm run build

      - name: Install production Composer dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader --no-progress

      # ── Create a clean distribution zip ──────────────────────────────────
      - name: Package release zip
        run: |
          DIST_DIR="${{ env.ARTIFACT_NAME }}"

          # Build the base from tracked source files.
          # export-ignore entries in .gitattributes keep dev-only files out.
          git archive HEAD --prefix="$DIST_DIR/" | tar -x

          # Overlay production Composer vendor (gitignored – not in archive).
          cp -r mc-includes/vendor "$DIST_DIR/mc-includes/"

          # Overlay built front-end assets (gitignored – not in archive).
          [ -d mc-admin/assets/css    ] && cp -r mc-admin/assets/css    "$DIST_DIR/mc-admin/assets/"
          [ -d mc-admin/assets/vendor ] && cp -r mc-admin/assets/vendor "$DIST_DIR/mc-admin/assets/"
          find mc-content/themes -name "*.css" -o -name "*.css.map" | while IFS= read -r f; do
            cp "$f" "$DIST_DIR/$f"
          done

          # Ensure writable runtime dirs exist with placeholder files.
          mkdir -p "$DIST_DIR/mc-content/cache" \
                   "$DIST_DIR/mc-content/uploads" \
                   "$DIST_DIR/mc-content/mu-plugins" \
                   "$DIST_DIR/mc-data/sessions"
          touch "$DIST_DIR/mc-content/cache/.gitkeep" \
                "$DIST_DIR/mc-content/uploads/.gitkeep" \
                "$DIST_DIR/mc-data/sessions/.gitkeep"

          zip -r "${{ env.ARTIFACT_NAME }}-${{ steps.version.outputs.version }}.zip" "$DIST_DIR/"

      # ── Create the GitHub release ────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "MinimalCMS ${{ steps.version.outputs.version }}"
          body: |
            ## MinimalCMS ${{ steps.version.outputs.version }}

            ### Installation
            1. Download `${{ env.ARTIFACT_NAME }}-${{ steps.version.outputs.version }}.zip` below
            2. Extract to your web server's document root
            3. Visit `https://yoursite.com/mc-admin/` to run the setup wizard

            ### Requirements
            - PHP 8.0+ with the sodium extension
            - Apache with mod_rewrite enabled

            See the [README](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/README.md) for full documentation.
          files: |
            ${{ env.ARTIFACT_NAME }}-${{ steps.version.outputs.version }}.zip
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          generate_release_notes: true
