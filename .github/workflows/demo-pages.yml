name: Demo Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: demo-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Pages demo artifact
        run: |
          rm -rf pages-dist pages-site
          mkdir -p pages-dist

          rsync -a demo/php-wasm/pages/ pages-dist/

          rsync -a --exclude-from=- . pages-site/ <<'EOF'
          .git
          .github
          .gitignore
          .gitattributes
          .phpunit.result.cache
          .phpunit.cache
          node_modules
          tests
          coverage
          phpunit.xml
          phpcs.xml.dist
          phpstan.neon
          phpstan.neon.dist
          package.json
          package-lock.json
          composer.json
          composer.lock
          demo
          mc-admin/assets/src
          mc-content/themes/default/src
          mc-content/cache/*
          mc-data/sessions/*
          EOF

          rm -f pages-site/config.json pages-site/mc-data/users.php
          cp pages-site/config.sample.json pages-site/config.json

          mkdir -p pages-site/mc-content/cache pages-site/mc-data/sessions
          touch pages-site/mc-content/cache/.gitkeep pages-site/mc-data/sessions/.gitkeep

          (cd pages-site && zip -rq ../pages-dist/site.zip .)

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
