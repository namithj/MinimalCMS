name: Deploy project page to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
  # Allow manual deploys from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages:    write
  id-token: write

# Only one deployment at a time; cancel the in-progress run if a new one starts.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url:  ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      # The project page lives entirely in docs/ — upload it as-is.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
