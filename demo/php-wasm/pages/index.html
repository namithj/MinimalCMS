<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MinimalCMS PHP-WASM Demo</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --ink: #15202b;
      --muted: #5f6b76;
      --accent: #0f766e;
      --border: #d7dde3;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at top, #eef5f3 0%, var(--bg) 60%);
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      padding: 0.9rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .toolbar h1 {
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      min-width: 200px;
    }

    .field {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex: 1;
      min-width: 240px;
    }

    label {
      font-size: 0.85rem;
      color: var(--muted);
      white-space: nowrap;
    }

    input {
      width: 100%;
      min-width: 120px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem 0.6rem;
      font-size: 0.95rem;
      outline: none;
      background: #fff;
      color: var(--ink);
    }

    button {
      border: 1px solid #0d5f59;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      padding: 0.5rem 0.8rem;
      font-weight: 600;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .status {
      font-size: 0.85rem;
      color: var(--muted);
      margin-left: auto;
    }

    .viewer {
      padding: 1rem;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 94px);
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
    }

    @media (max-width: 760px) {
      .status { width: 100%; margin-left: 0; }
      iframe { height: calc(100vh - 150px); }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <h1>MinimalCMS Demo (PHP-WASM)</h1>
    <div class="field">
      <label for="path">Path</label>
      <input id="path" value="/" autocomplete="off">
    </div>
    <button id="open">Open</button>
    <span id="status" class="status">Preparing runtime...</span>
  </div>

  <div class="viewer">
    <iframe id="preview" title="MinimalCMS PHP-WASM preview"></iframe>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
